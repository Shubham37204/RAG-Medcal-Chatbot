<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>🔍 AI Medical Chatbot</title>
   <style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #333;
    }

    .chat-container {
        max-width: 720px;
        margin: 2rem auto;
        padding: 1.5rem;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }

    h1 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #2c3e50;
    }

    #chat-box {
        max-height: 400px;
        overflow-y: auto;
        padding-right: 5px;
        margin-bottom: 1rem;
        scroll-behavior: smooth;
    }

    .message {
        margin-bottom: 0.8rem;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        max-width: 80%;
        line-height: 1.4;
        font-size: 0.95rem;
        word-wrap: break-word;
    }

    .user {
        background: #007bff;
        color: white;
        margin-left: auto;
        text-align: right;
        border-bottom-right-radius: 4px;
    }

    .assistant {
        background: #eef1f5;
        color: #333;
        margin-right: auto;
        text-align: left;
        border-bottom-left-radius: 4px;
    }

    form {
        margin-top: 1rem;
    }

    textarea {
        width: 100%;
        height: 60px;
        padding: 0.7rem;
        font-size: 1rem;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        resize: none;
        transition: 0.2s ease;
    }

    textarea:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.15);
    }

    button {
        padding: 0.6rem 1.2rem;
        font-size: 0.95rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s ease;
    }

    button[type="submit"] {
        background: #007bff;
        color: white;
    }

    button[type="submit"]:hover {
        background: #0056b3;
    }

    .clear-btn {
        background: #e74c3c;
        color: white;
        width: 100%;
        margin-top: 0.5rem;
    }

    .clear-btn:hover {
        background: #c0392b;
    }

    .error {
        color: #e74c3c;
        background: #fdecea;
        padding: 0.6rem;
        border-radius: 8px;
        text-align: center;
        margin-bottom: 1rem;
    }
</style>
</head>
<body>
    <div class="chat-container">
        <h1>🔍 AI Medical Chatbot New Change</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <div id="chat-box">
            {% for msg in messages %}
                <div class="message {{ msg.role }}">
                    <strong>{{ msg.role|capitalize }}:</strong><br />
                    {{ msg.content | safe | nl2br }}
                </div>
            {% endfor %}
        </div>

        <form method="post" action="{{ url_for('index') }}">
            <textarea name="prompt" placeholder="Ask a medical question..." required></textarea>
            <br />
            <button type="submit">Send</button>
        </form>

        <form method="get" action="{{ url_for('clear') }}">
            <button type="submit" class="clear-btn">Clear Chat</button>
        </form>
    </div>
</body>
</html>
